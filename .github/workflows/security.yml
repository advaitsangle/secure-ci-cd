name: Security Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif || true

      - name: Upload Gitleaks artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif

      - name: Upload Gitleaks SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Gate on findings
        if: always()
        run: python3 .github/scripts/sarif_gate.py gitleaks.sarif

  pip_audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --upgrade pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt -f json -o pip-audit.json || true

      - name: Convert pip-audit JSON to SARIF
        run: |
          python - <<'PY'
          import json

          with open("pip-audit.json") as f:
              results = json.load(f)

          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "pip-audit",
                          "informationUri": "https://github.com/pypa/pip-audit",
                          "rules": []
                      }
                  },
                  "results": []
              }]
          }

          rules = []
          results_list = []

          for pkg in results:
              name = pkg.get("name")
              version = pkg.get("version")
              for vuln in pkg.get("vulns", []):
                  if not isinstance(vuln, dict):   # skip bad entries
                      continue

                  rule_id = vuln.get("id", "UNKNOWN")
                  description = vuln.get("description", "")
                  aliases_val = vuln.get("aliases", [])
                  fix_val = vuln.get("fix_versions", [])

                  aliases = ", ".join(aliases_val) if isinstance(aliases_val, list) else str(aliases_val)
                  fixes = ", ".join(fix_val) if isinstance(fix_val, list) else str(fix_val)

                  rules.append({
                      "id": rule_id,
                      "shortDescription": {"text": f"{name} {version} vulnerable"},
                      "fullDescription": {"text": description},
                      "helpUri": f"https://osv.dev/vulnerability/{rule_id}",
                      "properties": {
                          "aliases": aliases,
                          "fix_versions": fixes
                      }
                  })

                  results_list.append({
                      "ruleId": rule_id,
                      "message": {"text": f"{name} {version} vulnerable ({rule_id})"},
                      "locations": [{
                          "physicalLocation": {
                              "artifactLocation": {"uri": "requirements.txt"}
                          }
                      }]
                  })

          sarif["runs"][0]["tool"]["driver"]["rules"] = rules
          sarif["runs"][0]["results"] = results_list

          with open("pip-audit.sarif", "w") as f:
              json.dump(sarif, f, indent=2)
          PY

      - name: Upload pip-audit SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit

      - name: Upload pip-audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json

      - name: Gate on findings
        if: always()
        run: python3 .github/scripts/sarif_gate.py pip-audit.sarif

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config=p/ci --severity=ERROR --sarif --output=semgrep.sarif || true

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif

      - name: Upload Semgrep SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Gate on findings
        if: always()
        run: python3 .github/scripts/sarif_gate.py semgrep.sarif

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install "bandit[sarif]"

      - name: Run Bandit
        run: bandit -r src/ --severity-level high -f sarif -o bandit.sarif || true

      - name: Upload Bandit SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Upload Bandit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit.sarif

      - name: Gate on findings
        if: always()
        run: python3 .github/scripts/sarif_gate.py bandit.sarif

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy FS scan (SARIF)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '0'

      - name: Build image
        run: docker build -t app:ci .

      - name: Trivy Image scan (SARIF)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: 'image'
          image-ref: 'app:ci'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy FS artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif

      - name: Upload Trivy Image artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif

      - name: Upload Trivy FS SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy Image SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Gate on findings
        if: always()
        run: |
          python3 .github/scripts/sarif_gate.py trivy-fs.sarif
          python3 .github/scripts/sarif_gate.py trivy-image.sarif
